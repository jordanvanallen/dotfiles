# Shadow
shadow = true;
# no-dnd-shadow = true;
# no-dock-shadow = true;
shadow-radius = 8.0;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 1.4;
shadow-exclude = [
  "class_g = 'i3-frame'",
  "class_g = 'firefox'",
  "class_g = 'brave'",
  "class_g = 'libreoffice'",
  "class_g = 'vlc'",
];
shadow-ignore-shaped = false;

# Opacity
dropdown_menu-opacity = 0.95;
active-opacity = 0.90;
inactive-opacity = 0.9;
frame-opacity = 0.7;
inactive-opacity-override = false;
blur-kern = "3x3box"
blur-background-exclude = [ "window_type = 'dock'", "window_type = 'desktop'", "window_type = 'i3-frame'" ];

opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'brave'",
  "100:class_g = 'vlc'",
  "100:class_g = 'libreoffice'"
];

# Fading
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-exclude = [
  "class_g = 'firefox'",
  "class_g = 'brave'",
  "class_g = 'libreoffice'",
];

focus-exclude = [
  "class_g = 'firefox'",
  "class_g = 'brave'",
  "class_g = 'libreoffice'",
];

opacity-exclude = [
  "class_g = 'firefox'",
  "class_g = 'brave'",
  "class_g = 'libreoffice'",
];

# Other
backend = "xrender"
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
vsync = false;
dbe = false;
detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];

# GLX backend
glx-copy-from-front = false;

# Window type settings
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.75; focus = true; };
};
